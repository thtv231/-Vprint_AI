# Quy tắc nhận diện ngôn ngữ đầu vào của khách hàng (Việt/Anh)
language_detection:
  # Từ khóa tiếng Việt có dấu, dùng khi người dùng gõ tự nhiên
  vi_markers:
    - "máy"
    - "giá"
    - "thông số"
    - "tư vấn"
    - "giúp"
    - "cần"
    - "muốn"
    - "bao nhiêu"
    - "như thế nào"
    - "ly giấy"
    - "in ấn"
    - "xưởng"
    - "bạn"
    - "tôi"
    - "được"
    - "không"
    - "có thể"
    - "cho tôi"
    - "vprint"
    - "tiếng việt"

  # Từ khóa tiếng Anh thường gặp trong ngữ cảnh hỏi máy/công nghệ
  en_markers:
    - "what"
    - "how"
    - "why"
    - "which"
    - "can you"
    - "could you"
    - "please"
    - "machine"
    - "printing"
    - "paper cup"
    - "price"
    - "specification"
    - "i need"
    - "i want"
    - "tell me"
    - "help me"
    - "for my factory"
    - "english"
    - "show me"
    - "recommend"
    - "compare"
    - "speed"
    - "size"
    - "industrial"
    - "factory"
    - "production line"
    - "quotation"
    - "quote"
    - "technical specs"
    - "brochure"
    - "packaging"
    - "carton"
    - "label"
    - "recommendation"

