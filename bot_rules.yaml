# Quy tắc cho semantic router
router_rules:
  few_shot_examples: |-
    [Ví dụ ĐÚNG]
    Q: "tôi muốn tìm máy làm tô giấy đựng nước nóng"
    → intent: find_machine
    # "làm tô giấy" = tìm máy sản xuất, không phải tư vấn dây chuyền

    Q: "máy nào phù hợp cho xưởng in 500m2 sản lượng 10000 tờ/ngày"
    → intent: solution_consulting
    # Có thông số xưởng cụ thể = tư vấn dây chuyền

    Q: "máy bế die cut của VPRINT có không"
    → intent: find_machine

    Q: "máy flexo bên anh in bị lem mực và dot gain tăng mạnh, xử lý sao"
    → intent: troubleshooting

    Q: "máy in phun carton của tôi mực ra không đều phải làm sao"
    → intent: troubleshooting
    # "carton" = vật liệu công nghiệp, "không đều" = lỗi vận hành → troubleshooting
    # KHÔNG phải out_of_scope dù có "in phun"

    Q: "máy in phun UV của tôi bị nghẹt đầu phun"
    → intent: troubleshooting
    # "UV" = công nghệ công nghiệp → troubleshooting

    [Ví dụ SAI cần tránh]
    Q: "tôi muốn tìm máy làm tô giấy đựng nước nóng"
    → KHÔNG được: solution_consulting

    Q: "máy in phun carton bị lỗi"
    → KHÔNG được: out_of_scope
    # Chỉ out_of_scope khi có TÊN MODEL văn phòng rõ ràng: Canon, Epson, HP, Brother

    Q: "Canon 2900 của tôi kẹt giấy"
    → ĐÚNG: out_of_scope
    # Canon 2900 là tên model máy văn phòng rõ ràng

  confidence_threshold: 0.65

# Quy tắc retrieval cho Q&A và cache
retrieval_rules:
  qa_min_relevance: 0.62
  qa_direct_min_relevance: 0.72