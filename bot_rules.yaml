# =============================================================
# bot_rules.yaml — VPRINT Chatbot Rules
# =============================================================
# THAY ĐỔI SO VỚI BẢN CŨ:
#
# 1. [cup_making] Thêm: to giay, bat giay, lam to, hop giay dung nuoc,
#    tu giay, bowl, food container — fix lỗi "tô giấy" → bucket unknown
#
# 2. [out_of_scope consumer_markers] Xóa "inkjet" và "printer" khỏi
#    consumer_markers — đây là từ khóa CÔNG NGHIỆP (máy in phun UV,
#    inkjet industrial). Giữ chúng gây router nhầm troubleshooting → out_of_scope
#
# 3. [operation_buckets printing] Xóa "in" đơn lẻ — quá chung chung,
#    match nhầm với "máy làm tô giấy đựng nước nóng" (có chữ "in" trong "đựng")
#    Giữ "offset", "flexo" và các từ cụ thể hơn
#
# 4. [router_rules few_shot_examples] Thêm ví dụ troubleshooting
#    cho máy in phun công nghiệp + ví dụ out_of_scope đúng chuẩn
#
# 5. [operation_buckets notebook_making] Thêm bucket mới cho máy làm vở/sách
#    để "Máy làm vở bài tập" không lọt vào kết quả tìm máy khác danh mục
# =============================================================

