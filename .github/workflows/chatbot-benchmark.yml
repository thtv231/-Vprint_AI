name: Chatbot Benchmark

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python ci_benchmark_chatbot.py \
            --start-server \
            --skip-if-no-key \
            --min-pass-rate 0.75 \
            --output-json benchmark_report.json \
            --junit-xml benchmark_report.xml

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chatbot-benchmark-report
          path: |
            benchmark_report.json
            benchmark_report.xml

